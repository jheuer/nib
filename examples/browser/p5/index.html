<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>nib + p5.js · flow field</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: #ede8dd;
      font: 14px/1.4 system-ui, -apple-system, sans-serif; color: #111;
      display: flex; flex-direction: column; align-items: center; padding: 1.5rem;
    }
    h1 { font-size: 1rem; font-weight: 600; margin: 0 0 1rem; }
    h1 .dim { color: #888; font-weight: 400; }
    .controls { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    button {
      background: white; border: 1px solid #ccc; color: #111;
      padding: 0.4rem 0.9rem; font: inherit; cursor: pointer; border-radius: 3px;
    }
    button:hover:not(:disabled) { border-color: #111; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.primary { background: #111; color: white; border-color: #111; }
    .status {
      font: 12px ui-monospace, monospace; color: #888;
      margin-left: auto; min-width: 18ch; text-align: right;
    }
    .status.ok    { color: #178e4a; }
    .status.busy  { color: #c58000; }
    .status.error { color: #d33; }
    #sketch {
      background: white; box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      border: 1px solid #d0cabd; line-height: 0;
    }
    .hint { color: #888; font-size: 12px; margin-top: 0.75rem; }
    code { background: #f1ecdf; padding: 1px 4px; border-radius: 2px; }
  </style>
</head>
<body>
  <h1>nib + p5.js <span class="dim">— flow field · <span id="count">0</span> strokes</span></h1>

  <div class="controls">
    <button id="regen">Regenerate</button>
    <button id="connect" class="primary">Connect AxiDraw</button>
    <button id="plot" disabled>Plot</button>
    <button id="home" disabled>Home</button>
    <div id="status" class="status">not connected</div>
  </div>

  <div id="sketch"></div>

  <p class="hint">
    Built with instance-mode p5.js. The sketch draws with <code>beginShape()</code>/<code>vertex()</code>;
    <code>nibCapture()</code> silently buffers every stroke in mm.
    Click <em>Plot</em> to stream the buffer to the plotter.
  </p>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.2/lib/p5.min.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
