<?xml version="1.0" encoding="UTF-8"?>
<!--
  Axis diagnostic pattern — 100×100mm.
  Compare X vs Y vs diagonal behaviour on a single sheet.

  Layout (each quadrant is 40×40mm, inset 5mm from the edges):
    TL  pure-X  : 10 horizontal lines, 40mm long
    TR  pure-Y  : 10 vertical lines,   40mm long
    BL  diagonals: 45° pairs, both directions
    BR  zigzags : tight X-aligned (top) + Y-aligned (bottom)
  Corner crosses at (5,5) (95,5) (5,95) (95,95) are registration refs —
  measure between them after plotting to check for axis drift/scale error.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="100mm" height="100mm"
     viewBox="0 0 100 100"
     stroke="black" stroke-width="0.3" fill="none">

  <!-- registration crosses (2mm arms) -->
  <g id="regmarks">
    <line x1="3"  y1="5"  x2="7"  y2="5"/>  <line x1="5"  y1="3"  x2="5"  y2="7"/>
    <line x1="93" y1="5"  x2="97" y2="5"/>  <line x1="95" y1="3"  x2="95" y2="7"/>
    <line x1="3"  y1="95" x2="7"  y2="95"/> <line x1="5"  y1="93" x2="5"  y2="97"/>
    <line x1="93" y1="95" x2="97" y2="95"/> <line x1="95" y1="93" x2="95" y2="97"/>
  </g>

  <!-- TL: pure X motion — 10 horizontal lines, 40mm long, 4mm apart -->
  <g id="x-lines">
    <line x1="8" y1="10" x2="48" y2="10"/>
    <line x1="8" y1="14" x2="48" y2="14"/>
    <line x1="8" y1="18" x2="48" y2="18"/>
    <line x1="8" y1="22" x2="48" y2="22"/>
    <line x1="8" y1="26" x2="48" y2="26"/>
    <line x1="8" y1="30" x2="48" y2="30"/>
    <line x1="8" y1="34" x2="48" y2="34"/>
    <line x1="8" y1="38" x2="48" y2="38"/>
    <line x1="8" y1="42" x2="48" y2="42"/>
    <line x1="8" y1="46" x2="48" y2="46"/>
  </g>

  <!-- TR: pure Y motion — 10 vertical lines, 40mm long, 4mm apart -->
  <g id="y-lines">
    <line x1="52" y1="8" x2="52" y2="48"/>
    <line x1="56" y1="8" x2="56" y2="48"/>
    <line x1="60" y1="8" x2="60" y2="48"/>
    <line x1="64" y1="8" x2="64" y2="48"/>
    <line x1="68" y1="8" x2="68" y2="48"/>
    <line x1="72" y1="8" x2="72" y2="48"/>
    <line x1="76" y1="8" x2="76" y2="48"/>
    <line x1="80" y1="8" x2="80" y2="48"/>
    <line x1="84" y1="8" x2="84" y2="48"/>
    <line x1="88" y1="8" x2="88" y2="48"/>
  </g>

  <!-- BL: 45° diagonals, both directions, in a 40×40 box at (8,52) -->
  <g id="diagonals">
    <!-- NW→SE diagonals, 5mm spacing -->
    <line x1="8"  y1="52" x2="48" y2="92"/>
    <line x1="13" y1="52" x2="48" y2="87"/>
    <line x1="18" y1="52" x2="48" y2="82"/>
    <line x1="23" y1="52" x2="48" y2="77"/>
    <line x1="8"  y1="57" x2="43" y2="92"/>
    <line x1="8"  y1="62" x2="38" y2="92"/>
    <line x1="8"  y1="67" x2="33" y2="92"/>
    <!-- NE→SW diagonals -->
    <line x1="48" y1="52" x2="8"  y2="92"/>
    <line x1="43" y1="52" x2="8"  y2="87"/>
    <line x1="38" y1="52" x2="8"  y2="82"/>
    <line x1="33" y1="52" x2="8"  y2="77"/>
    <line x1="48" y1="57" x2="13" y2="92"/>
    <line x1="48" y1="62" x2="18" y2="92"/>
    <line x1="48" y1="67" x2="23" y2="92"/>
  </g>

  <!-- BR top half: X-aligned zigzag (many direction changes on X axis) -->
  <!-- Peaks 2mm high, 2mm period, over 40mm of X travel -->
  <polyline id="zigzag-x" points="
    52,55 53,57 54,55 55,57 56,55 57,57 58,55 59,57 60,55 61,57
    62,55 63,57 64,55 65,57 66,55 67,57 68,55 69,57 70,55 71,57
    72,55 73,57 74,55 75,57 76,55 77,57 78,55 79,57 80,55 81,57
    82,55 83,57 84,55 85,57 86,55 87,57 88,55
  "/>

  <!-- BR middle: X-aligned tight square wave for step-response -->
  <polyline id="square-x" points="
    52,63 54,63 54,65 56,65 56,63 58,63 58,65 60,65 60,63 62,63
    62,65 64,65 64,63 66,63 66,65 68,65 68,63 70,63 70,65 72,65
    72,63 74,63 74,65 76,65 76,63 78,63 78,65 80,65 80,63 82,63
    82,65 84,65 84,63 86,63 86,65 88,65
  "/>

  <!-- BR bottom: Y-aligned zigzag (direction changes on Y axis) -->
  <!-- Mirror of zigzag-x rotated so travel is along Y -->
  <polyline id="zigzag-y" points="
    70,70 68,71 70,72 68,73 70,74 68,75 70,76 68,77 70,78 68,79
    70,80 68,81 70,82 68,83 70,84 68,85 70,86 68,87 70,88 68,89
    70,90
  "/>
  <polyline id="zigzag-y2" points="
    78,70 80,71 78,72 80,73 78,74 80,75 78,76 80,77 78,78 80,79
    78,80 80,81 78,82 80,83 78,84 80,85 78,86 80,87 78,88 80,89
    78,90
  "/>

  <!-- BR bottom-right: reference square 10×10mm for overall scale check -->
  <rect x="84" y="80" width="10" height="10"/>
</svg>
