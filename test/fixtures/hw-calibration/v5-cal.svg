<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50mm" height="50mm">
  <!-- Calibration plot 50x50mm: pen contact, pen-up travel, X/Y/diagonal, grid accuracy -->


  <rect x="0.5" y="0.5" width="49" height="49" fill="none" stroke="black" stroke-width="0.3"/>

  <!-- Grid lines every 10mm -->
  <!-- Horizontals -->
  <line x1="0.5"  y1="10" x2="49.5" y2="10" stroke="black" stroke-width="0.2"/>
  <line x1="0.5"  y1="20" x2="49.5" y2="20" stroke="black" stroke-width="0.2"/>
  <line x1="0.5"  y1="30" x2="49.5" y2="30" stroke="black" stroke-width="0.2"/>
  <line x1="0.5"  y1="40" x2="49.5" y2="40" stroke="black" stroke-width="0.2"/>
  <!-- Verticals -->
  <line x1="10" y1="0.5"  x2="10" y2="49.5" stroke="black" stroke-width="0.2"/>
  <line x1="20" y1="0.5"  x2="20" y2="49.5" stroke="black" stroke-width="0.2"/>
  <line x1="30" y1="0.5"  x2="30" y2="49.5" stroke="black" stroke-width="0.2"/>
  <line x1="40" y1="0.5"  x2="40" y2="49.5" stroke="black" stroke-width="0.2"/>

  <!-- Corner registration marks (L-shapes, 3mm arms) -->
  <!-- Top-left -->
  <polyline points="0.5,3.5 0.5,0.5 3.5,0.5" fill="none" stroke="black" stroke-width="0.4"/>
  <!-- Top-right -->
  <polyline points="46.5,0.5 49.5,0.5 49.5,3.5" fill="none" stroke="black" stroke-width="0.4"/>
  <!-- Bottom-left -->
  <polyline points="0.5,46.5 0.5,49.5 3.5,49.5" fill="none" stroke="black" stroke-width="0.4"/>
  <!-- Bottom-right -->
  <polyline points="46.5,49.5 49.5,49.5 49.5,46.5" fill="none" stroke="black" stroke-width="0.4"/>

  <!-- Center crosshair (8mm arms) -->
  <line x1="21" y1="25" x2="29" y2="25" stroke="black" stroke-width="0.35"/>
  <line x1="25" y1="21" x2="25" y2="29" stroke="black" stroke-width="0.35"/>

  <!-- Diagonal: tests combined XY motion -->
  <line x1="0.5" y1="0.5" x2="49.5" y2="49.5" stroke="black" stroke-width="0.2"/>

  <!-- Isolated pen-lift markers, one per quadrant. Drag marks between them = pen_pos_up too low. -->
  <!-- Q1 center (5, 5) — small plus -->
  <line x1="3.5" y1="5"   x2="6.5" y2="5"   stroke="black" stroke-width="0.3"/>
  <line x1="5"   y1="3.5" x2="5"   y2="6.5" stroke="black" stroke-width="0.3"/>
  <!-- Q2 center (45, 5) -->
  <line x1="43.5" y1="5"   x2="46.5" y2="5"   stroke="black" stroke-width="0.3"/>
  <line x1="45"   y1="3.5" x2="45"   y2="6.5" stroke="black" stroke-width="0.3"/>
  <!-- Q3 center (5, 45) -->
  <line x1="3.5" y1="45"  x2="6.5" y2="45"  stroke="black" stroke-width="0.3"/>
  <line x1="5"   y1="43.5" x2="5"  y2="46.5" stroke="black" stroke-width="0.3"/>
  <!-- Q4 center (45, 45) -->
  <line x1="43.5" y1="45"  x2="46.5" y2="45"  stroke="black" stroke-width="0.3"/>
  <line x1="45"   y1="43.5" x2="45" y2="46.5" stroke="black" stroke-width="0.3"/>
</svg>
